run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - unconvert
    - bodyclose
    - nolintlint

linters-settings:
  revive:
    rules:
      - name: var-naming
      - name: indent-error-flow
      - name: if-return
      - name: unreachable-code
      - name: errorf
      - name: context-as-argument
  misspell:
    locale: US

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - bodyclose
  max-same-issues: 0
  max-issues-per-linter: 0
