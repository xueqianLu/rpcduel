name: Bug report
description: Report a defect in rpcduel
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including the exact command you ran and the output you observed.
      placeholder: |
        $ rpcduel diff --rpc https://a --rpc https://b
        ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: rpcduel version
      description: Output of `rpcduel --version` or the commit hash you built from.
    validations:
      required: true
  - type: input
    id: go-version
    attributes:
      label: Go version
      description: Output of `go version` (only required if you built from source).
  - type: input
    id: os
    attributes:
      label: OS / arch
      placeholder: e.g. macOS 14 arm64, Ubuntu 22.04 amd64
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Logs, dataset shapes, anything else that helps reproduce the issue.
